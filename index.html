<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#6240c4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>共匪消消乐</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #f6efe2;
      --ink: #201816;
      --soft: #6f615c;
      --line: rgba(32, 24, 22, .14);
      --panel: rgba(255, 252, 246, .84);
      --tile: #fffdf8;
      --red: #b52222;
      --gold: #d5a326;
      --blue: #22628a;
      --green: #19715b;
      --purple: #744d87;
      --shadow: 0 20px 50px rgba(45, 30, 20, .16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
      background:
        linear-gradient(120deg, rgba(181, 34, 34, .12), transparent 38%),
        radial-gradient(circle at 82% 18%, rgba(34, 98, 138, .18), transparent 26rem),
        linear-gradient(145deg, #f2dfbf, var(--bg) 48%, #dfece4);
    }

    button {
      border: 1px solid rgba(32, 24, 22, .18);
      border-radius: 8px;
      min-height: 40px;
      padding: 0 14px;
      font: inherit;
      font-weight: 800;
      background: var(--ink);
      color: #fffaf1;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(32, 24, 22, .14);
    }

    button.secondary {
      background: #fffdf8;
      color: var(--ink);
      box-shadow: none;
    }

    button.ghost {
      background: transparent;
      color: var(--ink);
      box-shadow: none;
    }

    button:disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    .app {
      width: min(1220px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 18px 0 26px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.7rem);
      line-height: .95;
      letter-spacing: 0;
    }

    .subline {
      margin: 8px 0 0;
      color: var(--soft);
    }

    .userbar {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .userchip {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      font-weight: 800;
      cursor: pointer;
    }

    .userchip.is-user:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(53,35,95,.18); }
    .userchip.is-user:focus-visible { outline: 3px solid #ffe33e; outline-offset: 2px; }

    .userchip img {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      object-fit: cover;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .home {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 420px;
      gap: 18px;
      margin-top: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .panel.flat {
      box-shadow: none;
    }

    .map {
      display: grid;
      grid-template-columns: repeat(5, minmax(72px, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .level {
      min-height: 96px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      display: grid;
      align-content: space-between;
      text-align: left;
      color: var(--ink);
    }

    .level.locked {
      background: rgba(255, 253, 248, .46);
      color: rgba(32, 24, 22, .48);
      box-shadow: none;
    }

    .level strong {
      font-size: 1.6rem;
      line-height: 1;
    }

    .stars {
      color: var(--gold);
      white-space: nowrap;
      font-size: 1rem;
      min-height: 22px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      padding: 10px;
      min-width: 0;
    }

    .stat span {
      display: block;
      color: var(--soft);
      font-size: .78rem;
    }

    .stat b {
      display: block;
      font-size: 1.35rem;
      margin-top: 3px;
    }

    .roster {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .person {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 9px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      padding: 8px;
      min-width: 0;
    }

    .person b,
    .person small {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .person small { color: var(--soft); }

    .game {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 330px;
      gap: 18px;
      margin-top: 18px;
      align-items: start;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .board-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 252, 246, .78);
      padding: clamp(10px, 2vw, 16px);
      box-shadow: var(--shadow);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, minmax(34px, 1fr));
      gap: clamp(5px, 1vw, 9px);
      aspect-ratio: 1 / 1;
    }

    .tile {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      border: 1px solid rgba(32, 24, 22, .12);
      border-radius: 8px;
      background: var(--tile);
      padding: 0;
      overflow: hidden;
      box-shadow: inset 0 -3px 0 rgba(32, 24, 22, .07);
      transition: transform .12s ease, box-shadow .12s ease, opacity .18s ease;
    }

    .tile:hover,
    .tile:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(32, 24, 22, .16), inset 0 -3px 0 rgba(32, 24, 22, .07);
      outline: none;
    }

    .tile.selected {
      box-shadow: 0 0 0 3px var(--gold), 0 12px 22px rgba(32, 24, 22, .18);
      transform: translateY(-2px) scale(1.02);
    }

    .tile.clearing {
      opacity: .18;
      transform: scale(.78) rotate(-4deg);
    }

    .tile.blocker::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(45deg, transparent 42%, rgba(32, 24, 22, .38) 44%, rgba(32, 24, 22, .38) 56%, transparent 58%),
        linear-gradient(-45deg, transparent 42%, rgba(32, 24, 22, .28) 44%, rgba(32, 24, 22, .28) 56%, transparent 58%);
      pointer-events: none;
    }

    .avatar {
      width: 86%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      overflow: hidden;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      text-align: center;
      border: 3px solid rgba(255, 255, 255, .92);
      background: var(--blue);
      box-shadow: 0 6px 11px rgba(32, 24, 22, .15), inset 0 -12px 20px rgba(0, 0, 0, .13);
      font-size: clamp(.6rem, 1.55vw, 1rem);
      line-height: 1.05;
    }

    .person .avatar {
      width: 44px;
      border-width: 2px;
      font-size: .72rem;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar img.is-missing { display: none; }
    .avatar img.is-missing + span { display: grid; }
    .avatar span {
      display: none;
      width: 100%;
      height: 100%;
      place-items: center;
      padding: 4px;
    }

    .a0 { background: linear-gradient(145deg, #b52222, #e36a42); }
    .a1 { background: linear-gradient(145deg, #22628a, #62a7c2); }
    .a2 { background: linear-gradient(145deg, #19715b, #68a66e); }
    .a3 { background: linear-gradient(145deg, #744d87, #bd73a0); }
    .a4 { background: linear-gradient(145deg, #8a5b23, #d5a326); }
    .a5 { background: linear-gradient(145deg, #4b5662, #9aaab0); }
    .a6 { background: linear-gradient(145deg, #7d2b42, #cc6970); }

    .side {
      display: grid;
      gap: 12px;
    }

    .goals {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .goal {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      padding: 9px 10px;
      font-weight: 800;
    }

    .boosters {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .booster {
      min-height: 68px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 3px;
      padding: 8px 6px;
      background: #fffdf8;
      color: var(--ink);
      box-shadow: none;
    }

    .booster span { font-size: 1.35rem; line-height: 1; }
    .booster small { color: var(--soft); font-weight: 800; }

    .message {
      min-height: 26px;
      color: var(--red);
      font-weight: 800;
      margin-top: 10px;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(32, 24, 22, .36);
      z-index: 20;
    }

    .modal.active { display: grid; }

    .dialog {
      width: min(430px, 100%);
      border-radius: 8px;
      border: 1px solid rgba(32, 24, 22, .18);
      background: #fffaf1;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .dialog h2 { margin: 0 0 8px; }
    .dialog p { color: var(--soft); }
    .dialog-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .profile-card { text-align: left; }
    .profile-hero { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
    .profile-hero img { width:64px; height:64px; border-radius:50%; object-fit:cover; border:4px solid #fff; box-shadow:0 4px 12px #6b3dca33; }
    .profile-hero h2 { margin:0; font-size:1.35rem; }
    .profile-hero p { margin:3px 0 0; font-size:.85rem; overflow-wrap:anywhere; }
    .profile-stats { display:grid; grid-template-columns:repeat(2,1fr); gap:9px; }
    .profile-stat { padding:11px; border-radius:16px; background:linear-gradient(145deg,#f0eaff,#fff7d6); text-align:center; }
    .profile-stat span { display:block; color:#765f8c; font-size:.76rem; font-weight:800; }
    .profile-stat b { display:block; margin-top:3px; color:#5432a8; font-size:1.2rem; }
    .achievement-list { display:grid; gap:7px; margin-top:10px; }
    .achievement { padding:9px 11px; border-radius:13px; background:#f0f1f7; color:#8a8296; font-weight:800; }
    .achievement.unlocked { color:#4e369a; background:#fff0ad; }

    @media (max-width: 940px) {
      .topbar,
      .home,
      .game { grid-template-columns: 1fr; }
      .userbar { justify-content: flex-start; }
      .map { grid-template-columns: repeat(4, minmax(68px, 1fr)); }
    }

    @media (max-width: 560px) {
      .app { width: min(100vw - 14px, 1220px); }
      .hud,
      .meta-grid,
      .roster { grid-template-columns: repeat(2, 1fr); }
      .map { grid-template-columns: repeat(3, minmax(66px, 1fr)); }
      .board { gap: 4px; }
      .avatar { border-width: 2px; }
      button { padding: 0 10px; }
    }

    /* Mobile-first game shell */
    body { background: linear-gradient(180deg, #57c9ff 0, #b5efff 38%, #7bd66f 38%, #d7f39a 100%); }
    button { border: 0; border-radius: 16px; background: linear-gradient(#ff9d32, #f36b22); box-shadow: 0 5px 0 #c94b19, 0 8px 18px rgba(63,53,45,.2); }
    .app { width: min(100%, 560px); min-height: 100vh; padding: 0 0 86px; background: rgba(255,255,255,.18); overflow: hidden; }
    .topbar { position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; padding: max(10px, env(safe-area-inset-top)) 14px 10px; border: 0; background: linear-gradient(180deg,#7046d5,#5632b7); color: white; box-shadow: 0 4px 18px rgba(48,24,110,.32); }
    .brand h1 { font-size: 1.35rem; line-height: 1; text-shadow: 0 2px 0 #3b218d; }
    .brand .subline { display:none; }
    .userbar.auth { flex-wrap: nowrap; gap: 7px; }
    .userbar.auth > button { min-height: 34px; padding: 0 10px; font-size: .76rem; border-radius: 12px; box-shadow: none; }
    .userchip { min-height: 34px; padding: 4px 8px; border: 0; background: rgba(255,255,255,.18); color: white; font-size: .78rem; }
    .sound-btn { width: 36px; padding: 0!important; font-size: 1rem!important; }
    .home, .game { display: block; margin: 0; }
    .home > .panel { padding: 0; border: 0; border-radius: 0; box-shadow: none; background: transparent; }
    .map-head { position: relative; z-index: 2; margin: 14px; padding: 14px; border-radius: 22px; color: white; background: linear-gradient(135deg,#ff6688,#ff934a); box-shadow: 0 7px 0 #d64d55; }
    .map-head h2 { font-size: 1.15rem; }
    .map-head button { background: #fff; color: #ee5b45; box-shadow: 0 4px 0 rgba(146,51,44,.25); }
    .map { position: relative; display: flex; flex-direction: column; gap: 26px; min-height: 1100px; padding: 18px 18% 120px; background: radial-gradient(circle at 20% 8%,#fff7 0 28px,transparent 29px), linear-gradient(180deg,#80df78,#aee66f); }
    .map::before { content:""; position:absolute; top:20px; bottom:50px; left:50%; width:14px; transform:translateX(-50%); border-radius:20px; background: repeating-linear-gradient(#fff 0 18px,#f5d79a 18px 35px); box-shadow:0 0 0 5px #fff8; }
    .level { position:relative; z-index:1; width:76px; min-height:76px; display:grid; place-items:center; align-self:flex-start; padding:5px; border:5px solid #fff; border-radius:50%; color:white; text-align:center; background:linear-gradient(#ffd85a,#ff8c25); box-shadow:0 6px 0 #ce641c,0 8px 15px #386b5066; }
    .level:nth-child(even) { align-self:flex-end; }
    .level strong { font-size:1.55rem; }
    .level > span:not(.stars) { display:none; }
    .level .stars { position:absolute; top:72px; left:50%; transform:translateX(-50%); font-size:.7rem; color:#ffe33e; text-shadow:0 1px 2px #744; }
    .level.locked { background:linear-gradient(#b8c2c9,#7f8d96); color:#eef2f4; }
    .profile-panel { margin: -95px 12px 15px; position: relative; z-index:3; border-radius:24px; background:#fffaf0; }
    .profile-panel .meta-grid { grid-template-columns:repeat(4,1fr); }
    .profile-panel .stat { padding:8px 4px; text-align:center; }
    .profile-panel .stat b { font-size:1.05rem; }
    .roster { display:none; }
    .game { padding: 10px; background: linear-gradient(180deg,#7bd8ff,#e6fbff); min-height: calc(100vh - 58px); }
    .game > section { display:flex; flex-direction:column; }
    .hud { order:0; grid-template-columns:1.2fr 1.5fr 1fr; gap:7px; margin-bottom:9px; }
    .hud .stat { padding:7px 9px; border:3px solid #fff; border-radius:18px; background:linear-gradient(#7049d7,#5231b2); color:white; text-align:center; box-shadow:0 4px 0 #37217f; }
    .hud .stat:nth-child(4){display:none}.hud .stat span{color:#e8ddff}.hud .stat b{font-size:1.12rem}
    .board-wrap { order:2; padding:7px; border:4px solid #6940c4; border-radius:20px; background:#5330a5; box-shadow:0 7px 0 #352071,0 12px 25px #365b7780; }
    .board { gap:3px; }
    .tile { border-radius:12px; border:0; background:linear-gradient(#fff,#e9f4ff); box-shadow:inset 0 -3px 0 #c9d4e3; touch-action:none; }
    .tile .avatar { width:92%; border:2px solid #fff; }
    .message { color:#fff; margin:6px 5px 0; min-height:20px; font-size:.85rem; }
    .side { order:1; display:block; }
    .side .panel { border:0; background:transparent; padding:0; }
    .side .panel:first-child { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .side .panel:first-child .userbar { min-width:74px; }
    .side h2,.side #levelText { display:none; }
    #backHome { width:44px; min-height:44px; padding:0; border-radius:50%; background:#fff; color:#6140be; box-shadow:0 4px 0 #b5c9d3; font-size:0; }
    #backHome::after { content:"‹"; font-size:2rem; }
    .goals { flex:1; display:flex; gap:6px; margin:0; }
    .goal { flex:1; padding:8px; border:3px solid #fff; border-radius:16px; background:#fffb; font-size:.72rem; }
    .side .panel:nth-child(2) { position:fixed; bottom:max(8px,env(safe-area-inset-bottom)); left:50%; z-index:12; width:min(calc(100% - 20px),540px); transform:translateX(-50%); padding:7px 12px; border-radius:22px; background:#fff; box-shadow:0 5px 20px #294b6666; }
    .boosters { margin:0; }.booster{min-height:53px;border-radius:16px;background:linear-gradient(#fff,#e8edff);color:#4d35a0;box-shadow:0 3px 0 #b8bfdd}.booster span{font-size:1.15rem}.booster small{font-size:.68rem}
    .side .panel:nth-child(3){display:none}
    .modal { padding:16px; background:#30206099; backdrop-filter:blur(5px); }
    .dialog { border:5px solid #fff; border-radius:28px; padding:24px; text-align:center; background:linear-gradient(#fff9e6,#fff); box-shadow:0 10px 0 #d7b9a0,0 20px 50px #30206088; }
    .dialog h2 { font-size:2rem;color:#6b3dca }.dialog .stars{font-size:2.5rem}.dialog-actions{justify-content:center}.dialog-actions button{flex:1}
    .reward-icon{font-size:4rem;filter:drop-shadow(0 5px 2px #c98b28)}
    @media(min-width:700px){body{padding:20px}.app{border-radius:28px;box-shadow:0 25px 70px #20475b66}.topbar{position:relative}.side .panel:nth-child(2){position:absolute;bottom:18px}.game{position:relative;padding-bottom:95px}}

    /* Hand-drawn grassland game skin */
    :root {
      --grass: #b9f77f;
      --grass-dark: #65a33f;
      --cream: #fffbd7;
      --wood: #9b591d;
      --wood-light: #d68b35;
      --outline: #24331d;
      --sky-button: #28aaf4;
    }
    body {
      background: var(--grass);
      background-image:
        radial-gradient(ellipse at 18% 16%, transparent 0 15px, rgba(63,125,34,.55) 16px 18px, transparent 19px),
        radial-gradient(ellipse at 81% 28%, transparent 0 12px, rgba(63,125,34,.45) 13px 15px, transparent 16px),
        linear-gradient(180deg, #bdfb86, #b0ef78);
      background-size: 190px 230px, 250px 280px, auto;
    }
    .app {
      position: relative;
      background: transparent;
      overflow: hidden;
    }
    .app::before,
    .app::after {
      position: fixed;
      z-index: 0;
      color: rgba(58,116,31,.62);
      font-size: 38px;
      line-height: 1;
      content: "〽";
      pointer-events: none;
      transform: rotate(-14deg);
    }
    .app::before { top: 19%; left: max(18px, calc(50% - 250px)); }
    .app::after { top: 43%; right: max(20px, calc(50% - 245px)); transform: rotate(17deg); }
    .topbar {
      position: relative;
      z-index: 5;
      min-height: 112px;
      padding: max(14px, env(safe-area-inset-top)) 14px 18px;
      background: transparent;
      color: var(--outline);
      box-shadow: none;
      align-items: flex-start;
    }
    .brand {
      position: absolute;
      top: max(18px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      min-width: 132px;
      padding: 8px 18px 9px;
      border: 3px solid #111;
      border-radius: 10px;
      background: #111;
      color: #fff;
      text-align: center;
      box-shadow: 0 4px 0 rgba(0,0,0,.22);
    }
    .brand h1 { font-size: 1.05rem; text-shadow: none; white-space: nowrap; }
    .brand h1::before { content: "- "; }
    .brand h1::after { content: " -"; }
    .userbar.auth {
      width: 100%;
      justify-content: space-between;
    }
    #userChip { display: none; }
    .userchip {
      order: 3;
      max-width: 145px;
      border: 3px solid var(--outline);
      border-radius: 16px;
      background: rgba(255,255,255,.48);
      color: var(--outline);
      box-shadow: 0 4px 0 rgba(45,85,28,.28);
    }
    .sound-btn {
      order: 1;
      width: 47px;
      min-height: 47px!important;
      border: 3px solid #111!important;
      border-radius: 10px!important;
      background: linear-gradient(#42c2ff,#168fe2)!important;
      color: white!important;
      box-shadow: 0 5px 0 #0b558c!important;
    }
    #guestLogin { display: none; }
    #googleLogin {
      order: 4;
      min-height: 42px;
      min-width: 84px;
      border: 3px solid var(--outline);
      border-radius: 14px;
      background: linear-gradient(#43c3ff,#1998ec);
      color: white;

      min-height: calc(100vh - 112px);
      padding: 4px 10px 108px;

      border: 3px solid var(--outline);

      background: #111;

      position: relative;
      padding: 12px;
      border: 5px solid var(--outline);

      background: linear-gradient(#c37a2f,#8f4c18);

      height: 14%;

    }

</head>
<body>
  <main class="app">

  <div id="resultModal" class="modal" role="dialog" aria-modal="true">

  <script>
    const GOOGLE_CLIENT_ID = "908844567115-s8qk27t1n3bi56ssjth8evifbjss4dkg.apps.googleusercontent.com";
    const TELEGRAM_BOT_USERNAME = "miegongbot";
    const TELEGRAM_BOT_URL = `https://t.me/${TELEGRAM_BOT_USERNAME}`;
    const saveKey = "cpc-match3-save-v2";

    const people = [
      { name: "习近平", title: "中共中央总书记", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Xi_Jinping_meets_Putin_May_2026.jpg/330px-Xi_Jinping_meets_Putin_May_2026.jpg" },
      { name: "李强", title: "中共中央政治局常委", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Li_Qiang_meets_Keir_Starmer_Jan_2026.jpg/330px-Li_Qiang_meets_Keir_Starmer_Jan_2026.jpg" },
      { name: "赵乐际", title: "中共中央政治局常委", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Zhao_Leji_meets_Keir_Starmer_Jan_2026.jpg/330px-Zhao_Leji_meets_Keir_Starmer_Jan_2026.jpg" },
      { name: "王沪宁", title: "中共中央政治局常委", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Wang_Huning_2025_National_People%27s_Congress.jpg/330px-Wang_Huning_2025_National_People%27s_Congress.jpg" },
      { name: "蔡奇", title: "中共中央政治局常委", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/2025%E5%B9%B4%E8%94%A1%E5%A5%87%E4%B9%A6%E8%AE%B0.jpg/330px-2025%E5%B9%B4%E8%94%A1%E5%A5%87%E4%B9%A6%E8%AE%B0.jpg" },
      { name: "丁薛祥", title: "中共中央政治局常委", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Ding_Xuexiang_2024_%28cropped%29.jpg/330px-Ding_Xuexiang_2024_%28cropped%29.jpg" },
      { name: "李希", title: "中共中央政治局常委", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/Li_Xi_%28cropped%29_%282025%29_01.jpg/330px-Li_Xi_%28cropped%29_%282025%29_01.jpg" },
      { name: "王毅", title: "中共中央政治局委员", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Jake_Sullivan_and_Wang_Yi_met_in_Bangkok_%282024%29_%28cropped%29.jpg/330px-Jake_Sullivan_and_Wang_Yi_met_in_Bangkok_%282024%29_%28cropped%29.jpg" },
      { name: "尹力", title: "中共中央政治局委员", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/%E5%B0%B9%E5%8A%9B_Yin_Li_2019.jpg/330px-%E5%B0%B9%E5%8A%9B_Yin_Li_2019.jpg" },
      { name: "石泰峰", title: "中共中央政治局委员", image: "https://upload.wikimedia.org/wikipedia/commons/b/b5/Shi_Taifeng_2025.jpg" },
      { name: "刘国中", title: "中共中央政治局委员", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Chinese_Vice_Premier_Liu_Guozhong.jpg/330px-Chinese_Vice_Premier_Liu_Guozhong.jpg" },
      { name: "李干杰", title: "中共中央政治局委员", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Li_Ganjie.jpg/330px-Li_Ganjie.jpg" },
      { name: "李书磊", title: "中共中央政治局委员", image: "https://upload.wikimedia.org/wikipedia/commons/3/3c/%E6%9D%8E%E4%B9%A6%E7%A3%8A%E7%85%A7%E7%89%87.jpg" },
      { name: "李鸿忠", title: "中共中央政治局委员", image: "https://upload.wikimedia.org/wikipedia/commons/0/08/Li_Hongzhong_%2854520503317%29.jpg" }
    ];

    const levels = Array.from({ length: 30 }, (_, i) => {
      const n = i + 1;
      const cards = n === 1 ? 27 : n === 2 ? 90 : Math.min(108, 54 + Math.floor(n / 3) * 9);
      return {
        id: n,
        cards,
        types: n === 1 ? 5 : people.length,
        unlockText: n === 1 ? "新手关：三张相同卡牌即可消除" :
          n === 2 ? "超难第二关：多层遮挡，七格卡槽放满即失败" :
          "多层叠牌挑战：合理控制卡槽，清空全部卡牌",
        starScores: [Math.floor(cards * 12), Math.floor(cards * 16), Math.floor(cards * 20)]
      };
    });

    let state = loadSave();
    let cards = [];
    let tray = [];
    let lastMove = null;
    let busy = false;
    let activeLevel = levels[0];
    let score = 0;
    let moves = 0;
    let combo = 0;
    let audioOn = true;
    let audioContext = null;
    let lastVoiceAt = 0;
    window.speechSynthesis?.cancel();

    const el = {
      home: document.querySelector("#homeScreen"),
      game: document.querySelector("#gameScreen"),
      board: document.querySelector("#board"),
      tray: document.querySelector("#tray"),
      map: document.querySelector("#levelMap"),
      roster: document.querySelector("#roster"),
      userChip: document.querySelector("#userChip"),
      maxLevel: document.querySelector("#maxLevel"),
      totalStars: document.querySelector("#totalStars"),
      coins: document.querySelector("#coins"),
      lives: document.querySelector("#lives"),
      levelNo: document.querySelector("#levelNo"),
      score: document.querySelector("#score"),
      moves: document.querySelector("#moves"),
      combo: document.querySelector("#combo"),
      goals: document.querySelector("#goals"),
      message: document.querySelector("#message"),
      levelText: document.querySelector("#levelText"),
      modal: document.querySelector("#resultModal"),
      resultTitle: document.querySelector("#resultTitle"),
      resultText: document.querySelector("#resultText"),
      resultStars: document.querySelector("#resultStars"),
      nextLevel: document.querySelector("#nextLevel"),
      googleLogin: document.querySelector("#googleLogin"),
      telegramStatus: document.querySelector("#telegramStatus"),
      telegramOpen: document.querySelector("#telegramOpen")
    };
    let firebaseCloudLoading = false;

    function defaultSave() {
      return {
        user: null,
        guest: false,
        updatedAt: 0,
        registeredAt: "",
        points: 0,
        maxUnlocked: 1,
        stars: {},
        coins: 120,
        lives: 5,
        lastDaily: "",
        boosters: { hammer: 3, shuffle: 3, extraMoves: 2 }
      };
    }

    function loadSave() {
      try {
        return { ...defaultSave(), ...JSON.parse(localStorage.getItem(saveKey) || "{}") };
      } catch {
        return defaultSave();
      }
    }

    function save() {
      state.updatedAt = Date.now();
      localStorage.setItem(saveKey, JSON.stringify(state));
      renderShell();
      window.firebaseCloud?.scheduleSave(state);
    }

    window.gameCloudBridge = {
      getLocalSave: () => ({ ...state }),
      applyCloudSave(cloudSave, firebaseUser) {
        const user = {
          uid: firebaseUser.uid,
          name: firebaseUser.displayName || firebaseUser.email || "Google 玩家",
          email: firebaseUser.email || "",
          picture: firebaseUser.photoURL || ""
        };
        state = {
          ...defaultSave(),
          ...cloudSave,
          registeredAt: cloudSave.registeredAt || firebaseUser.metadata?.creationTime || new Date().toISOString(),
          user,
          guest: false
        };

      setFirebaseUser(firebaseUser) {

          name: firebaseUser.displayName || firebaseUser.email || "Google 玩家",
          email: firebaseUser.email || "",

        } : null;
        if (firebaseUser && !state.registeredAt) {
          state.registeredAt = firebaseUser.metadata?.creationTime || new Date().toISOString();

        localStorage.setItem(saveKey, JSON.stringify(state));

    function renderRoster() {
      el.roster.innerHTML = people.map((p, i) => `

    function renderMap() {
      el.map.innerHTML = levels.map(level => {
        const unlocked = level.id <= state.maxUnlocked;
        const stars = state.stars[level.id] || 0;
        const starText = "★".repeat(stars) + "☆".repeat(3 - stars);
        return `<button type="button" class="level ${unlocked ? "" : "locked"}" data-level="${level.id}" ${unlocked ? "" : "disabled"}>
          <strong>${level.id}</strong>
          <span>${unlocked ? level.unlockText : "未解锁"}</span>
          <span class="stars">${starText}</span>
        </button>`;
      }).join("");
      el.map.querySelectorAll(".level:not(.locked)").forEach(btn => {
        btn.addEventListener("click", () => startLevel(Number(btn.dataset.level)));
      });
    }

    function createBoard(level) {
      cards = [];
      tray = [];
      lastMove = null;
      let typeCursor = 0;
      const layerCounts = level.id === 1 ? [12, 9, 6] :
        level.id === 2 ? [30, 24, 21, 15] :
        splitIntoLayers(level.cards, Math.min(5, 3 + Math.floor(level.id / 6)));
      let cardId = 0;
      layerCounts.forEach((count, z) => {
        const positions = layerPositions(count, z, level.id);
        const types = [];
        for (let i = 0; i < count / 3; i++) {
          const type = typeCursor++ % level.types;
          types.push(type, type, type);
        }
        shuffleArray(types);
        positions.forEach((pos, index) => cards.push({
          id: cardId++,
          type: types[index],
          x: pos.x,
          y: pos.y,
          z,
          removed: false
        }));
      });
    }

    function splitIntoLayers(total, layerCount) {
      const counts = Array(layerCount).fill(0);
      let triples = total / 3;
      for (let i = 0; i < triples; i++) counts[i % layerCount] += 3;
      return counts;
    }

    function layerPositions(count, z, levelId) {
      const result = [];
      const cols = levelId === 1 ? 4 : z % 2 ? 5 : 6;
      const rows = Math.ceil(count / cols);
      const xGap = levelId === 1 ? 19 : cols === 6 ? 14 : 16;
      const yGap = Math.min(13.5, 68 / Math.max(rows - 1, 1));
      const width = (cols - 1) * xGap;
      const height = (rows - 1) * yGap;
      const offset = z % 2 ? 4 : 0;
      for (let i = 0; i < count; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        result.push({
          x: 50 - width / 2 + col * xGap + offset,
          y: 48 - height / 2 + row * yGap + (z % 3) * 1.2
        });
      }
      shuffleArray(result);
      return result;
    }

    function isCovered(card) {
      return cards.some(other =>
        !other.removed && other.z > card.z &&
        Math.abs(other.x - card.x) < 12 &&
        Math.abs(other.y - card.y) < 11
      );
    }

    function startLevel(id) {
      const signedIn = Boolean(state.user) || Boolean(window.firebaseCloud?.isSignedIn?.());
      if (!signedIn && id > 1) {
        el.message.textContent = "";
        alert("游客可以试玩第一关。登录 Google 后才能挑战第二关和保存进度。");
        requestGoogleLogin();
        return;
      }
      if (state.lives <= 0) {
        alert("体力不足，完成每日签到可以获得补给！");
        return;
      }
      playSound("tap");
      activeLevel = levels[id - 1] || levels[0];
      score = 0;
      moves = 0;
      combo = 0;
      busy = false;
      el.message.textContent = "";
      createBoard(activeLevel);
      show("game");
      renderGame();
    }

    function renderGame() {
      const remaining = cards.filter(card => !card.removed).length;
      el.levelNo.textContent = activeLevel.id;
      el.score.textContent = score;
      el.moves.textContent = remaining;
      el.combo.textContent = tray.length;
      el.levelText.textContent = activeLevel.unlockText;
      renderGoals();
      el.board.innerHTML = "";
      [...cards].sort((a, b) => a.z - b.z || a.id - b.id).forEach(card => {
        if (card.removed) return;
        const covered = isCovered(card);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `tile ${covered ? "covered" : "pickable"}`;
        btn.style.left = `${card.x - 7}%`;
        btn.style.top = `${card.y - 7}%`;
        btn.style.zIndex = String(card.z * 100 + card.id);
        btn.setAttribute("aria-label", `${people[card.type].name}${covered ? "，被遮挡" : "，可点击"}`);
        btn.disabled = covered || busy;
        btn.innerHTML = avatar(card.type);
        btn.addEventListener("click", () => pickCard(card.id));
        el.board.appendChild(btn);
      });
      renderTray();
      document.querySelector("#hammer span").textContent = "↗";
      document.querySelector("#hammer small").textContent = `移出 x${state.boosters.hammer}`;
      document.querySelector("#shuffle span").textContent = "↻";
      document.querySelector("#shuffle small").textContent = `洗牌 x${state.boosters.shuffle}`;
      document.querySelector("#extraMoves span").textContent = "↶";
      document.querySelector("#extraMoves small").textContent = `撤回 x${state.boosters.extraMoves}`;
    }

    function renderTray() {
      el.tray.classList.toggle("danger", tray.length >= 6);
      el.tray.innerHTML = Array.from({ length: 7 }, (_, index) =>
        `<div class="tray-slot">${tray[index] === undefined ? "" : avatar(tray[index].type)}</div>`
      ).join("");
    }

    function renderGoals() {
      const remaining = cards.filter(card => !card.removed).length;
      el.goals.innerHTML = [
        ["清空卡牌", `${activeLevel.cards - remaining} / ${activeLevel.cards}`],
        ["卡槽", `${tray.length} / 7`]
      ].map(([name, value]) => `<div class="goal"><span>${name}</span><span>${value}</span></div>`).join("");
    }

    async function pickCard(id) {
      if (busy) return;
      const card = cards.find(item => item.id === id);
      if (!card || card.removed || isCovered(card)) {
        el.message.textContent = "这张牌被上层卡牌压住了。";
        playSound("error");
        return;
      }
      busy = true;
      card.removed = true;
      moves++;
      const insertAt = tray.reduce((last, item, index) => item.type === card.type ? index + 1 : last, tray.length);
      tray.splice(insertAt, 0, { id: card.id, type: card.type });
      lastMove = { id: card.id, matched: false };
      score += 10;
      playSound("tap");
      renderGame();
      await wait(160);
      const same = tray.filter(item => item.type === card.type);
      if (same.length >= 3) {
        let removed = 0;
        tray = tray.filter(item => {
          if (item.type === card.type && removed < 3) {
            removed++;
            return false;
          }
          return true;
        });
        combo++;
        score += 90 + combo * 20;
        lastMove.matched = true;
        playSound(combo > 1 ? "combo" : "match", combo);
        renderGame();
        await wait(180);
      } else {
        combo = 0;
      }
      busy = false;
      renderGame();
      checkEnd();
    }

    function goalsMet() {
      return cards.every(card => card.removed) && tray.length === 0;
    }

    function starsEarned() {
      if (!goalsMet()) return 0;
      const usedBoosters = moves > activeLevel.cards ? 1 : 0;
      return activeLevel.id === 2 ? Math.max(1, 3 - usedBoosters) : 3;
    }

    function checkEnd() {
      if (goalsMet()) return finishLevel(true);
      if (tray.length >= 7) return finishLevel(false);
    }

    function finishLevel(won) {
      busy = true;
      const earned = won ? starsEarned() : 0;
      if (won) {
        state.stars[activeLevel.id] = Math.max(state.stars[activeLevel.id] || 0, earned);
        if (state.user) {
          state.maxUnlocked = Math.max(state.maxUnlocked, Math.min(levels.length, activeLevel.id + 1));
        } else {
          state.maxUnlocked = activeLevel.id === 1 ? 2 : 1;
        }
        state.coins += 20 + earned * 10;
        state.points += score;
        save();
        playSound("win");
        speakPraise(`恭喜，通过灭共第 ${activeLevel.id} 关`, true);
      } else {
        state.lives = Math.max(0, state.lives - 1);
        state.maxUnlocked = 1;
        save();
        playSound("lose");
      }
      el.resultTitle.textContent = won ? "恭喜，灭共成功" : "挑战失败";
      el.resultText.textContent = won
        ? (state.user ? `得分 ${score}，获得 ${earned} 星，下一关已解锁。` : `得分 ${score}，获得 ${earned} 星。登录 Google 后才能进入第二关。`)
        : `得分 ${score}，挑战失败，需要从第一关重新开始。`;
      el.resultStars.textContent = won ? "★".repeat(earned) + "☆".repeat(3 - earned) : "☆☆☆";
      el.nextLevel.textContent = won && !state.user ? "登录继续" : "下一关";
      document.querySelector("#retryLevel").textContent = won ? "重玩" : "从第一关重来";
      el.nextLevel.disabled = !won || activeLevel.id >= levels.length;
      el.modal.classList.add("active");
    }

    function useHammer() {
      if (busy || state.boosters.hammer <= 0 || !tray.length) return;
      state.boosters.hammer--;
      const rescued = tray.splice(0, Math.min(3, tray.length));
      const topZ = Math.max(...cards.map(card => card.z), 0) + 1;
      rescued.forEach((item, index) => {
        const card = cards.find(entry => entry.id === item.id);
        if (!card) return;
        card.removed = false;
        card.z = topZ;
        card.x = 35 + index * 15;
        card.y = 88;
      });
      lastMove = null;
      save();
      playSound("swap");
      el.message.textContent = "已将卡槽中的牌移回牌面。";
      renderGame();
    }

    function useShuffle() {
      if (busy || state.boosters.shuffle <= 0) return;
      state.boosters.shuffle--;
      state.coins = Math.max(0, state.coins - 8);
      const remaining = cards.filter(card => !card.removed);
      const types = remaining.map(card => card.type);
      shuffleArray(types);
      remaining.forEach((card, index) => { card.type = types[index]; });
      save();
      playSound("swap");
      el.message.textContent = "未进入卡槽的牌已重新洗牌。";
      renderGame();
    }

    function useExtraMoves() {
      if (busy || state.boosters.extraMoves <= 0 || !lastMove || lastMove.matched) {
        el.message.textContent = "当前没有可以撤回的操作。";
        return;
      }
      state.boosters.extraMoves--;
      const index = tray.findIndex(item => item.id === lastMove.id);
      const card = cards.find(item => item.id === lastMove.id);
      if (index >= 0) tray.splice(index, 1);
      if (card) card.removed = false;
      score = Math.max(0, score - 10);
      moves = Math.max(0, moves - 1);
      lastMove = null;
      save();
      playSound("swap");
      el.message.textContent = "已撤回上一步。";
      renderGame();
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function playSound(type, level = 1) {
      if (!audioOn) return;
      try {
        audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
        const now = audioContext.currentTime;
        const melodies = {
          tap: [[660, 0, .055]],
          swap: [[523, 0, .07], [659, .055, .08]],
          match: [[784, 0, .09], [988, .07, .12]],
          combo: [[659, 0, .08], [784, .065, .08], [988 + Math.min(level, 4) * 28, .13, .15]],
          error: [[294, 0, .1], [247, .08, .13]],
          win: [[523, 0, .13], [659, .1, .13], [784, .2, .13], [1047, .3, .34]],
          lose: [[392, 0, .13], [330, .1, .15], [262, .2, .25]]
        };
        (melodies[type] || melodies.tap).forEach(([frequency, delay, duration], index) => {
          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();
          const start = now + delay;
          oscillator.type = type === "lose" || type === "error" ? "triangle" : index % 2 ? "sine" : "triangle";
          oscillator.frequency.setValueAtTime(frequency, start);
          oscillator.frequency.exponentialRampToValueAtTime(frequency * 1.025, start + duration * .45);
          gain.gain.setValueAtTime(.001, start);
          gain.gain.exponentialRampToValueAtTime(type === "win" ? .105 : .075, start + .012);
          gain.gain.exponentialRampToValueAtTime(.001, start + duration);
          oscillator.connect(gain).connect(audioContext.destination);
          oscillator.start(start);
          oscillator.stop(start + duration + .02);
        });
        if (navigator.vibrate && ["match", "combo", "win"].includes(type)) navigator.vibrate(type === "win" ? [35, 40, 60] : 18);
      } catch {}
    }

    function speakPraise(text, force = false) {
      if (!audioOn || !window.speechSynthesis) return;
      if (!/^恭喜，通过灭共第\s*\d+\s*关$/.test(text)) return;
      const now = Date.now();
      if (!force && now - lastVoiceAt < 3500) return;
      lastVoiceAt = now;
      if (force) speechSynthesis.cancel();
      const voice = new SpeechSynthesisUtterance(text);
      voice.lang = "zh-CN";
      const voices = speechSynthesis.getVoices?.() || [];
      const preferredVoice = voices.find(item =>
        /zh|cmn|yue/i.test(item.lang) && /female|xiaoxiao|xiaoyi|huihui|tingting|mei|hanhan|yaoyao|yating|google/i.test(item.name)
      ) || voices.find(item => /zh|cmn|yue/i.test(item.lang));
      if (preferredVoice) voice.voice = preferredVoice;
      voice.rate = 1.2;
      voice.pitch = 1.72;
      voice.volume = 1;
      speechSynthesis.speak(voice);
    }

    function setupDailyReward() {
      const today = new Date().toLocaleDateString("en-CA");
      if (state.lastDaily !== today) document.querySelector("#dailyModal").classList.add("active");
      document.querySelector("#claimDaily").addEventListener("click", () => {
        if (state.lastDaily !== today) {
          state.lastDaily = today;
          state.coins += 50;
          state.boosters.hammer++;
          state.lives = Math.min(5, state.lives + 1);
          save();
        }
        document.querySelector("#dailyModal").classList.remove("active");
        playSound("win");
      });
    }

    function setupGoogle() {
      document.querySelector("#googleLogin").addEventListener("click", () => {
        if (GOOGLE_CLIENT_ID.startsWith("YOUR_")) {
          alert("要启用真实 Google 登录，请先在代码里把 GOOGLE_CLIENT_ID 替换成你的 OAuth Client ID。");
          return;
        }
        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: response => {
            const payload = JSON.parse(atob(response.credential.split(".")[1].replace(/-/g, "+").replace(/_/g, "/")));
            state.user = { name: payload.name, email: payload.email, picture: payload.picture };
            state.guest = false;
            save();
          }
        });
        google.accounts.id.prompt();
      });
    }

    function waitForFirebaseCloud(timeout = 8000) {
      if (window.firebaseCloud) return Promise.resolve(window.firebaseCloud);
      firebaseCloudLoading = true;
      el.googleLogin.disabled = true;
      el.googleLogin.textContent = "登录服务加载中…";
      return new Promise(resolve => {
        let done = false;
        const started = Date.now();
        const finish = value => {
          if (done) return;
          done = true;
          clearInterval(timer);
          window.removeEventListener("firebaseCloudReady", onReady);
          firebaseCloudLoading = false;
          if (!state.user) el.googleLogin.disabled = false;
          renderShell();
          resolve(value);
        };
        const onReady = () => finish(window.firebaseCloud || null);
        const timer = setInterval(() => {
          if (window.firebaseCloud) finish(window.firebaseCloud);
          else if (Date.now() - started >= timeout) finish(null);
        }, 120);
        window.addEventListener("firebaseCloudReady", onReady, { once: true });
      });
    }

    async function requestGoogleLogin() {
      if (state.user) {
        openProfile();
        return;
      }
      const tgUser = getTelegramWebAppUser();
      if (tgUser?.id && setTelegramUser(tgUser)) return;
      const cloud = await waitForFirebaseCloud();
      if (!cloud) {
        alert("Google 登录服务还没有加载成功，请刷新页面后再试。");
        return;
      }
      try {
        await cloud.signIn();
      } catch (error) {
        if (!["auth/popup-closed-by-user", "auth/cancelled-popup-request"].includes(error?.code)) {
          console.error("Google sign-in failed", error);
          alert(`Google 登录失败：${error?.code || "请检查网络后重试"}`);
        }
      }
    }

    function setupFirebaseGoogle() {
      document.querySelector("#googleLogin").addEventListener("click", requestGoogleLogin);
    }

    document.querySelector("#guestLogin").addEventListener("click", () => {
      state.guest = true;
      state.user = null;
      save();
    });
    el.telegramOpen?.addEventListener("click", () => {
      const webApp = window.Telegram?.WebApp;
      if (webApp?.openTelegramLink) {
        webApp.openTelegramLink(TELEGRAM_BOT_URL);
      } else {
        window.location.href = TELEGRAM_BOT_URL;
      }
    });
    el.userChip.addEventListener("click", openProfile);
    el.userChip.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        openProfile();
      }
    });
    document.querySelector("#closeProfile").addEventListener("click", () => {
      document.querySelector("#profileModal").classList.remove("active");
    });
    document.querySelector("#soundToggle").addEventListener("click", event => {
      audioOn = !audioOn;
      if (!audioOn && window.speechSynthesis) speechSynthesis.cancel();
      event.currentTarget.textContent = audioOn ? "🔊" : "🔇";
      if (audioOn) playSound("tap");
    });
    document.querySelector("#continueBtn").addEventListener("click", () => startLevel(state.maxUnlocked));
    document.querySelector("#backHome").addEventListener("click", () => { show("home"); renderShell(); });
    document.querySelector("#hammer").addEventListener("click", useHammer);
    document.querySelector("#shuffle").addEventListener("click", useShuffle);
    document.querySelector("#extraMoves").addEventListener("click", useExtraMoves);
    document.querySelector("#retryLevel").addEventListener("click", () => {
      el.modal.classList.remove("active");
      startLevel(goalsMet() ? activeLevel.id : 1);
    });
    document.querySelector("#nextLevel").addEventListener("click", () => {
      el.modal.classList.remove("active");
      if (!state.user) {
        requestGoogleLogin();
        return;
      }
      startLevel(Math.min(levels.length, activeLevel.id + 1));
    });
    document.querySelector("#modalMap").addEventListener("click", () => {
      el.modal.classList.remove("active");
      show("home");
      busy = false;
      renderShell();
    });

    setupTelegramLogin();
    setupFirebaseGoogle();
    renderShell();
    setupDailyReward();
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { browserLocalPersistence, getAuth, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, setPersistence, signInWithPopup, signInWithRedirect } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { doc, getDoc, getFirestore, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCEsxzPapIGmscl47IvQSj-_opQ5xQcpSg",
      authDomain: "gongfei-match3.firebaseapp.com",
      projectId: "gongfei-match3",
      storageBucket: "gongfei-match3.firebasestorage.app",
      messagingSenderId: "908844567115",
      appId: "1:908844567115:web:d3b7c10f2c9b549e75dbce"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: "select_account" });
    let saveTimer;
    const persistenceReady = Promise.race([
      setPersistence(auth, browserLocalPersistence).catch(error => {
        console.warn("Firebase auth persistence fallback", error);
      }),
      new Promise(resolve => setTimeout(resolve, 1500))
    ]);

    function prefersRedirectLogin() {
      return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) ||
        (window.matchMedia?.("(pointer: coarse)").matches && window.innerWidth < 820);
    }

    async function signInGoogle() {
      await persistenceReady;
      if (prefersRedirectLogin()) {
        sessionStorage.setItem("googleLoginPending", "1");
        await signInWithRedirect(auth, provider);
        return;
      }
      try {
        return await signInWithPopup(auth, provider);
      } catch (error) {
        if (["auth/popup-blocked", "auth/web-storage-unsupported", "auth/operation-not-supported-in-this-environment"].includes(error?.code)) {
          sessionStorage.setItem("googleLoginPending", "1");
          await signInWithRedirect(auth, provider);
          return;
        }
        throw error;
      }
    }

    function cleanSave(source) {
      return {
        updatedAt: Number(source.updatedAt) || Date.now(),
        registeredAt: source.registeredAt || "",
        points: Number(source.points) || 0,
        maxUnlocked: Number(source.maxUnlocked) || 1,
        stars: source.stars || {},
        coins: Number(source.coins) || 0,
        lives: Number(source.lives) || 0,
        lastDaily: source.lastDaily || "",
        boosters: source.boosters || { hammer: 0, shuffle: 0, extraMoves: 0 }
      };
    }

    async function uploadSave(source) {
      if (!auth.currentUser) return;
      await setDoc(doc(db, "players", auth.currentUser.uid), {
        ...cleanSave(source),
        profile: {
          name: auth.currentUser.displayName || "",
          email: auth.currentUser.email || "",
          picture: auth.currentUser.photoURL || ""
        },
        syncedAt: serverTimestamp()
      }, { merge: true });
    }

    window.firebaseCloud = {
      signIn: signInGoogle,
      isSignedIn: () => Boolean(auth.currentUser),
      scheduleSave(source) {
        if (!auth.currentUser) return;
        clearTimeout(saveTimer);
        const snapshot = cleanSave(source);
        saveTimer = setTimeout(() => uploadSave(snapshot).catch(console.error), 500);
      }
    };
    window.dispatchEvent(new Event("firebaseCloudReady"));

    async function syncFirebaseUser(firebaseUser) {
      if (!firebaseUser) return;
      try {
        const local = cleanSave(window.gameCloudBridge.getLocalSave());
        const ref = doc(db, "players", firebaseUser.uid);
        const snapshot = await getDoc(ref);
        if (!snapshot.exists()) {
          window.gameCloudBridge.setFirebaseUser(firebaseUser);
          await uploadSave(local);
          return;
        }
        const cloud = snapshot.data();
        if ((Number(cloud.updatedAt) || 0) >= local.updatedAt) {
          window.gameCloudBridge.applyCloudSave(cleanSave(cloud), firebaseUser);
        } else {
          window.gameCloudBridge.setFirebaseUser(firebaseUser);
          await uploadSave(local);
        }
      } catch (error) {
        console.error("Cloud save sync failed", error);
        window.gameCloudBridge.setFirebaseUser(firebaseUser);
      }
    }

    getRedirectResult(auth).then(async result => {
      if (result?.user) {
        sessionStorage.removeItem("googleLoginPending");
        window.gameCloudBridge.setFirebaseUser(result.user);
        await syncFirebaseUser(result.user);
      } else if (auth.currentUser) {
        window.gameCloudBridge.setFirebaseUser(auth.currentUser);
      }
    }).catch(error => {
      sessionStorage.removeItem("googleLoginPending");
      console.error("Google redirect sign-in failed", error);
      alert(`Google 登录返回失败：${error?.code || "请重新尝试"}`);
    });

    onAuthStateChanged(auth, syncFirebaseUser);
  </script>
